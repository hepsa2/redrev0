<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基础测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f0f0f0;
        }
        .box {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 4px solid #ccc;
        }
        .success { border-left-color: green; }
        .error { border-left-color: red; }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>基础功能测试</h1>
    <div id="output">
        <div class="box">等待测试...</div>
    </div>
    
    <button onclick="test1()">测试1: 点击是否有效</button>
    <button onclick="test2()">测试2: 加载 Supabase</button>
    
    <script>
        // 先测试最基本的功能
        console.log('脚本已加载');
        
        function test1() {
            alert('JavaScript 工作正常！按钮点击有效！');
            document.getElementById('output').innerHTML = '<div class="box success">✅ 测试1通过：JavaScript 正常工作</div>';
        }
        
        function test2() {
            const output = document.getElementById('output');
            output.innerHTML = '<div class="box">正在加载 Supabase 库...</div>';
            
            // 动态加载 Supabase
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
            script.onload = function() {
                output.innerHTML = '<div class="box success">✅ Supabase 库加载成功！</div>';
                test3();
            };
            script.onerror = function() {
                output.innerHTML = '<div class="box error">❌ Supabase 库加载失败！<br>可能原因：网络问题、CDN被墙</div>';
            };
            document.head.appendChild(script);
        }
        
        function test3() {
            const output = document.getElementById('output');
            
            try {
                const supabase = window.supabase.createClient(
                    'https://dlzmdgbpvvsuvhkxxctr.supabase.co',
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsem1kZ2JwdnZzdXZoa3h4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5ODkxNDQsImV4cCI6MjA4OTU2NTE0NH0.8c5HPCsCGhrW3nuzhUzOZVJTus2-qw5TQb90WnRiFQ8'
                );
                
                output.innerHTML += '<div class="box success">✅ Supabase 客户端初始化成功！</div>';
                
                // 测试数据库连接
                test4(supabase);
            } catch (error) {
                output.innerHTML += '<div class="box error">❌ 初始化失败：' + error.message + '</div>';
            }
        }
        
        async function test4(supabase) {
            const output = document.getElementById('output');
            output.innerHTML += '<div class="box">正在连接数据库...</div>';
            
            try {
                const { data, error } = await supabase
                    .from('categories')
                    .select('*');
                
                if (error) {
                    output.innerHTML += '<div class="box error">❌ 数据库查询失败：<br>' + error.message + '<br><br>错误详情：<br>' + JSON.stringify(error, null, 2) + '</div>';
                } else if (data) {
                    output.innerHTML += '<div class="box success">✅ 数据库连接成功！<br>找到 ' + data.length + ' 个板块<br><pre>' + JSON.stringify(data, null, 2) + '</pre></div>';
                }
            } catch (error) {
                output.innerHTML += '<div class="box error">❌ 异常：' + error.message + '</div>';
            }
        }
        
        // 页面加载后显示提示
        window.onload = function() {
            console.log('页面加载完成');
            document.getElementById('output').innerHTML = '<div class="box">✅ 页面已加载<br><br>请点击【测试1】确认按钮是否有效</div>';
        };
    </script>
</body>
</html>
