<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简化版测试</title>
    <style>
        body {
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            background: #b30000;
            color: white;
            border: none;
            border-radius: 5px;
        }
        /* 超级简化的模态框样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
        }
        .modal-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 10px;
            min-width: 300px;
            max-width: 500px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <h1>🔍 简化版模态框测试</h1>
    
    <div id="info" style="padding: 15px; background: #f0f0f0; margin: 20px 0; border-radius: 5px;">
        等待操作...
    </div>
    
    <button onclick="showLogin()">显示登录框</button>
    <button onclick="showSignup()">显示注册框</button>
    
    <!-- 登录模态框 - 默认隐藏 -->
    <div id="loginModal" style="display: none;">
        <div class="modal">
            <div class="modal-box">
                <h2>登录</h2>
                <form onsubmit="handleLogin(event)">
                    <input type="email" id="loginEmail" required placeholder="邮箱" />
                    <input type="password" id="loginPassword" required placeholder="密码" />
                    <button type="submit" style="width: 100%; margin-top: 10px;">登录</button>
                    <button type="button" onclick="closeLogin()" style="width: 100%; margin-top: 10px; background: #666;">关闭</button>
                </form>
            </div>
        </div>
    </div>
    
    <!-- 注册模态框 - 默认隐藏 -->
    <div id="signupModal" style="display: none;">
        <div class="modal">
            <div class="modal-box">
                <h2>注册</h2>
                <form onsubmit="handleSignup(event)">
                    <input type="email" id="signupEmail" required placeholder="邮箱" />
                    <input type="password" id="signupPassword" required placeholder="密码（至少6位）" minlength="6" />
                    <input type="password" id="signupPasswordConfirm" required placeholder="确认密码" minlength="6" />
                    <button type="submit" style="width: 100%; margin-top: 10px;">注册</button>
                    <button type="button" onclick="closeSignup()" style="width: 100%; margin-top: 10px; background: #666;">关闭</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let supabase;
        
        // 初始化
        window.addEventListener('DOMContentLoaded', function() {
            try {
                supabase = window.supabase.createClient(
                    'https://dlzmdgbpvvsuvhkxxctr.supabase.co',
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsem1kZ2JwdnZzdXZoa3h4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5ODkxNDQsImV4cCI6MjA4OTU2NTE0NH0.8c5HPCsCGhrW3nuzhUzOZVJTus2-qw5TQb90WnRiFQ8'
                );
                document.getElementById('info').innerHTML = '✅ Supabase 已就绪，可以测试登录/注册';
                console.log('初始化成功');
            } catch (error) {
                document.getElementById('info').innerHTML = '❌ 初始化失败: ' + error.message;
            }
        });
        
        // 显示登录框 - 直接修改 style.display
        function showLogin() {
            console.log('显示登录框');
            document.getElementById('loginModal').style.display = 'block';
            document.getElementById('info').innerHTML = '📝 登录框已打开';
        }
        
        function closeLogin() {
            console.log('关闭登录框');
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('info').innerHTML = '✅ 登录框已关闭';
        }
        
        // 显示注册框 - 直接修改 style.display
        function showSignup() {
            console.log('显示注册框');
            document.getElementById('signupModal').style.display = 'block';
            document.getElementById('info').innerHTML = '📝 注册框已打开';
        }
        
        function closeSignup() {
            console.log('关闭注册框');
            document.getElementById('signupModal').style.display = 'none';
            document.getElementById('info').innerHTML = '✅ 注册框已关闭';
        }
        
        // 处理登录
        async function handleLogin(e) {
            e.preventDefault();
            document.getElementById('info').innerHTML = '⏳ 正在登录...';
            
            try {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                
                console.log('尝试登录:', email);
                
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    document.getElementById('info').innerHTML = '❌ 登录失败: ' + error.message;
                    alert('登录失败: ' + error.message);
                } else {
                    document.getElementById('info').innerHTML = '✅ 登录成功！用户: ' + email;
                    alert('登录成功！');
                    closeLogin();
                }
            } catch (error) {
                document.getElementById('info').innerHTML = '❌ 异常: ' + error.message;
                console.error('登录异常:', error);
            }
        }
        
        // 处理注册
        async function handleSignup(e) {
            e.preventDefault();
            document.getElementById('info').innerHTML = '⏳ 正在注册...';
            
            try {
                const email = document.getElementById('signupEmail').value;
                const password = document.getElementById('signupPassword').value;
                const confirmPassword = document.getElementById('signupPasswordConfirm').value;
                
                if (password !== confirmPassword) {
                    alert('两次密码输入不一致');
                    document.getElementById('info').innerHTML = '❌ 两次密码输入不一致';
                    return;
                }
                
                console.log('尝试注册:', email);
                
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });
                
                if (error) {
                    document.getElementById('info').innerHTML = '❌ 注册失败: ' + error.message;
                    alert('注册失败: ' + error.message);
                } else {
                    document.getElementById('info').innerHTML = '✅ 注册成功！请检查邮箱验证链接';
                    alert('注册成功！请检查邮箱: ' + email);
                    closeSignup();
                }
            } catch (error) {
                document.getElementById('info').innerHTML = '❌ 异常: ' + error.message;
                console.error('注册异常:', error);
            }
        }
    </script>
</body>
</html>
